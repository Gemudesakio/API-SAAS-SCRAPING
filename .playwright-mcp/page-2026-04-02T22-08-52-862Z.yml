                    - generic [ref=e1333]:
                      - text: Cheaper than the more expensive segway S-plus. Although the S-plus seems to turn smoother and overall has better movement overall. This one is lighter and is more flashy than the other one. The speakers are kinda pointless because you'd probably be better off just listening off your phone at that point.
                      - text: I'm probably biased of the speakers because I'm spoiled and like good bass.
                      - text: The steering is slightly less comfortable than the S-plus and has slightly less platform for your feet.
                      - text: I had to get rid of this one because I wiped out on it twice. Once the first day and the second time ended up in the E.R. and walked out with my arm in a sling (thankfully not broken). Easy to ride until there's a bump too large to ride over that you didn't see. Take it from me, pay attention, your driving. Take it one wheel at a time over bumps.
                      - text: If you're trying to be budget friendly and have flashy lights, buy this one. If you have a little more money and plan on riding this for more than a hobby, probably buy the S-plus.
