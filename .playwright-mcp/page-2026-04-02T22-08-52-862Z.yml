            - generic [ref=e813]:
              - heading "Segway Ninebot S2 Electric Self-Balancing Scooter" [level=1] [ref=e815]
              - generic [ref=e816]:
                - paragraph [ref=e817]: Embark on a journey of convenience and style with the Segway Ninebot S2 Electric Self-Balancing Scooter. Engineered for riders aged 16 to 50 years, and accommodating heights from 4'3" to 6'6", this scooter provides a versatile and thrilling mode of transportation. The S2 boasts a robust design, supporting a maximum payload of 220 lbs, ensuring durability without compromising on comfort. With a maximum speed of 11.2 mph and an impressive range of approximately 21.7 miles, this scooter effortlessly handles your daily commute or leisurely rides. Tailored to your skill level, the S2 introduces a Beginner mode that can be customized through the app, allowing you to learn at your own pace. Navigate varied terrains with confidence, thanks to the S2's exceptional slope-climbing ability of approximately 15°. Experience intelligent battery management with the Smart BMS and a nominal energy of 335 Wh, offering a charging time of approximately 4.5 hours. Stay connected with the Segway app, which allows you to disable or reset the Beginner mode after 0.6 miles, giving you the freedom to customize your riding experience. Unlock the potential of your commute with the Segway Ninebot S2 Electric Self-Balancing Scooter - where performance, adaptability, and style converge for an unparalleled riding experience.
                - paragraph [ref=e818]: "[1] Vehicle height: The distance from the ground to the highest point of the vehicle body."
                - paragraph [ref=e819]: "[2] Typical range: Tested while riding under full power, 165.3lbs (75 kg) load, 77°F (25°C), 60% of max. speed on average on pavement."
                - paragraph [ref=e820]: "* Some of the factors that affect range include: speed, number of starts and stops, ambient temperature, etc."
