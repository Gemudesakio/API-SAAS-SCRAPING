                      - generic [ref=e1559]:
                        - generic [ref=e1561]:
                          - text: The GT3 is an absolutely excellent scooter for commuters and others who want a durable, stable and powerful ride around town.
                          - text: This scooter is built like a tank. You won't want to carry it up and down many steps and you won't want to put in the trunk of a sedan. But if you want a ride that feels stable and makes you feel confident as a rider, this one is a good choice.
                          - text: The deck is big and roomy, which makes me and my big feet happy. The cockpit is nicely laid out, with controls positioned comfortably and intuitively. The suspension makes navigating the rough streets I ride on safer and less jarring. The dual disk brakes are string and reliable. They are cable-actuated, so not as powerful or self-adjusting as hydraulics, but more than adequate for city riding and a lot easier and cheaper to maintain and repair.
                          - text: I'm a city dweller, so range is more than adequate for me and charging time isn't an issue. Top speed is not an issue, because riding faster than 30 mph in short city blocks with lots of traffic is just not a good idea anyway. Acceleration is important and the GT3 has plenty to get me across the big intersections and to zip out of potentially hazardous traffic pockets.
                          - text: So far, I just don't have any serious complaints. If your use case is like mine and you don't have to carry your scooter up and down stairs, this is one that's well worth considering.
